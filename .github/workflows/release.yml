name: Release
concurrency:
  group: release
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release:
    name: Generate release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs['src-tauri--release_created'] }}
      tag_name: ${{ steps.release.outputs['src-tauri--tag_name'] }}
    steps:
      - id: release
        name: Open pull request
        uses: googleapis/release-please-action@v5

  build:
    name: Build
    needs: release
    if: needs.release.outputs.release_created == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "macos-latest"
            args: "--target aarch64-apple-darwin --bundles app,dmg"
            target: "aarch64-apple-darwin"
          - os: "macos-latest"
            args: "--target x86_64-apple-darwin --bundles app,dmg"
            target: "x86_64-apple-darwin"
          - os: "ubuntu-22.04"
            args: "--bundles appimage,deb"
            target: ""
          - os: "windows-latest"
            args: "--target aarch64-pc-windows-msvc --bundles nsis"
            target: "aarch64-pc-windows-msvc"
          - os: "windows-latest"
            args: "--target x86_64-pc-windows-msvc --bundles nsis"
            target: "x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag_name }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf pkg-config libssl-dev gcc-aarch64-linux-gnu

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2026-05-01
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.release.outputs.tag_name }}
          releaseName: ${{ needs.release.outputs.tag_name }}
          releaseDraft: false
          assetNamePattern: "[name]-[arch][ext]"
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
